# ControlHub Docker 部署
# 使用方法：
#   cd docker && docker-compose up -d
#   停止: docker-compose down
#   查看日志: docker-compose logs -f
#   进入容器: docker-compose exec controlhub bash

version: '3.8'

services:
  controlhub:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: controlhub
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # 数据持久化
      - mysql_data:/var/lib/mysql
      - storage_data:/var/www/html/backend/storage
      # 环境配置（可选，覆盖默认值）
      - ../.env:/var/www/html/backend/.env:ro
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - DB_DATABASE=controlhub
      - DB_USERNAME=root
      - DB_PASSWORD=
      - APP_KEY=${APP_KEY:-}
      - APP_URL=${APP_URL:-http://localhost:8080}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mysql_data:
    driver: local
  storage_data:
    driver: local
